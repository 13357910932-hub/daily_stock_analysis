name: 荣晟环保股票分析
# 仅支持手动触发，不会自动运行，你什么时候需要分析，什么时候点一下就行
on:
  workflow_dispatch:

jobs:
  run_analysis:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取官方的daily_stock_analysis工具代码
      - name: 拉取分析工具
        uses: actions/checkout@v4
        with:
          repository: siacin/daily_stock_analysis
          fetch-depth: 0

      # 2. 配置Python环境
      - name: 配置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # 3. 安装依赖
      - name: 安装运行依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 配置你的专属分析参数
      - name: 配置分析参数
        run: |
          cat <<EOF > .env
          # 目标股票：荣晟环保
          STOCK_LIST=603165
          
          # DeepSeek API配置
          OPENAI_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_BASE_URL=https://api.deepseek.com/v1
          OPENAI_MODEL=deepseek-chat
          
          # 缠论+MACD分析策略，5%乖离率阈值
          AGENT_MODE=true
          AGENT_SKILLS=chan_theory
          AGENT_MAX_STEPS=10
          BIAS_THRESHOLD=5.0
          
          # 自定义提示：告诉AI你的持股成本
          CUSTOM_PROMPT="用户的持股成本为15.64元，请结合这个成本，给出后续的买卖点建议"
          
          # 飞书通知配置
          FEISHU_WEBHOOK_URL=${{ secrets.FEISHU_WEBHOOK }}
          
          # 关闭定时任务，仅单次运行
          SCHEDULE_ENABLED=false
          RUN_IMMEDIATELY=true
          MARKET_REVIEW_ENABLED=false
          DISABLE_CHIP_ANALYSIS=true
          EOF

      # 5. 运行分析
      - name: 执行股票分析
        run: |
          python main.py
