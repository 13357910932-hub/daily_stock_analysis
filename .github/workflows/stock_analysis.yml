name: 股票分析
# 仅手动触发，不会自动运行
on:
  workflow_dispatch:

jobs:
  run_analysis:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取官方分析工具
      - name: 拉取分析工具
        uses: actions/checkout@v5
        with:
          repository: siacin/daily_stock_analysis
          fetch-depth: 0

      # 2. 配置Python环境
      - name: 配置Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      # 3. 安装依赖，额外安装Tavily的依赖
      - name: 安装运行依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install tavily-python

      # 4. 配置你的专属参数
      - name: 配置分析参数
        run: |
          cat <<EOF > .env
          # 目标股票：杭钢股份
          STOCK_LIST=600126
          
          # DeepSeek API配置
          OPENAI_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_BASE_URL=https://api.deepseek.com/v1
          OPENAI_MODEL=deepseek-chat
          
          # 启用的6个分析策略
          AGENT_MODE=true
          AGENT_SKILLS=bull_trend,ma_golden_cross,shrink_pullback,volume_breakout,one_yang_three_yin,chan_theory
          AGENT_MAX_STEPS=20
          BIAS_THRESHOLD=5.0
          
          # 修正了Tavily变量名
          TAVILY_API_KEYS=${{ secrets.TAVILY_API_KEYS }}
          
          # 禁用筹码分析，解决"筹码不可用"的提示
          DISABLE_CHIP_ANALYSIS=true
          
          # 启动A股大盘复盘
          MARKET_REVIEW_ENABLED=true
          
          # 完整报告
          REPORT_TYPE=full
          
          # 飞书通知
          FEISHU_WEBHOOK_URL=${{ secrets.FEISHU_WEBHOOK }}
          
          # 单次运行，关闭定时
          SCHEDULE_ENABLED=false
          RUN_IMMEDIATELY=true
          EOF

      # 5. 运行分析
      - name: 执行股票分析
        run: |
          python main.py
