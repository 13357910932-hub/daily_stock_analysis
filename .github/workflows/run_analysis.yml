name: 股票分析 300775
on:
  workflow_dispatch:   # 有这个才会出现运行按钮

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analysis
        env:
          WEBUI_ENABLED: ${{ secrets.WEBUI_ENABLED }}
          WEBUI_HOST: ${{ secrets.WEBUI_HOST }}
          WEBUI_PORT: ${{ secrets.WEBUI_PORT }}
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SSL: ${{ secrets.SMTP_SSL }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_SUBJECT: ${{ secrets.MAIL_SUBJECT }}
          MAIL_ENABLED: ${{ secrets.MAIL_ENABLED }}
        run: python main.py
