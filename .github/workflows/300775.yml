name: Daily Stock Analysis - 三角防务每日分析

# 触发配置：
# 1. 定时触发：UTC时间7点 = 北京时间15:00（下午3点，A股收盘后），仅周一到周五（A股交易日）
# 2. 支持手动触发，可随时手动运行分析
on:
  schedule:
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

jobs:
  run-stock-analysis:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取项目代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置Python环境
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple

      # 4. 运行每日分析任务
      - name: Run daily stock analysis
        env:
          # 强制Node24兼容，消除之前的警告
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
          
          # 基础配置
          STOCK_LIST: 300775
          
          # DeepSeek模型配置（从Secrets读取密钥）
          LLM_DEEPSEEK_API_KEY: ${{ secrets.LLM_DEEPSEEK_API_KEY }}
          LLM_DEEPSEEK_BASE_URL: https://api.deepseek.com/v1
          LLM_DEEPSEEK_MODELS: deepseek-reasoner
          
          # 【新增】显式指定Agent使用的模型，解决Agent找不到模型的问题
          AGENT_LITELLM_MODEL: deepseek/deepseek-reasoner
          
          # Tavily搜索配置（从Secrets读取密钥）
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          
          # 策略配置
          BIAS_THRESHOLD: 5.0
          AGENT_MODE: true
          AGENT_SKILLS: chan_theory
          AGENT_SKILL_ROUTING: manual
          NEWS_MAX_AGE_DAYS: 3
          
          # 飞书推送配置（从Secrets读取配置）
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
          FEISHU_WEBHOOK_KEYWORD: 股票日报
          
          # 运行模式：关闭项目内定时，由GitHub Actions负责定时，运行时立即执行
          SCHEDULE_ENABLED: false
          RUN_IMMEDIATELY: true
          
          # 系统配置
          LOG_LEVEL: INFO
          MAX_WORKERS: 3
        run: |
          python main.py
